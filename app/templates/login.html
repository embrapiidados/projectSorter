{% extends "base.html" %}

{% block title %}Login - Sistema de Categorização de Projetos{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-sign-in-alt me-2"></i>Login com SharePoint</h4>
            </div>
            <div class="card-body">
                {% if error %}
                <div class="alert alert-danger">
                    <i class="fas fa-exclamation-circle me-2"></i>{{ error }}
                </div>
                {% endif %}
                
                <form method="POST" action="{{ url_for('main.login') }}">
                    <div class="mb-3">
                        <label for="site_url" class="form-label">URL do Site SharePoint</label>
                        <input type="url" class="form-control" id="site_url" name="site_url" required 
                               placeholder="https://suaempresa.sharepoint.com/sites/seuprojeto">
                    </div>
                    
                    <div class="mb-3">
                        <label for="username" class="form-label">Usuário</label>
                        <input type="email" class="form-control" id="username" name="username" required 
                               placeholder="seu.email@empresa.com">
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-sign-in-alt me-2"></i>Entrar
                        </button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-muted text-center">
                <small>Suas credenciais são usadas apenas para autenticação com o SharePoint</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
